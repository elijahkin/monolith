name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key:
            bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel',
            'MODULE.bazel.lock') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Install GCC 14 and lcov (needed for C++23 headers and coverage)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 libstdc++-14-dev lcov
          sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-14 100

      - name: Build and test
        run: |
          bazel test //... \
          --test_output=errors \
          --repo_env=CC=/usr/bin/gcc-14 \
          --repo_env=CXX=/usr/bin/g++-14 \
          --action_env=CC=/usr/bin/gcc-14 \
          --action_env=CXX=/usr/bin/g++-14

      - name: Generate coverage report
        env:
          VERBOSE_COVERAGE: "1"
        run: |
          set -x
          bazel coverage //... \
            --combined_report=lcov \
            --instrumentation_filter=//[...] \
            --repo_env=CC=/usr/bin/gcc-14 \
            --repo_env=CXX=/usr/bin/g++-14 \
            --action_env=CC=/usr/bin/gcc-14 \
            --action_env=CXX=/usr/bin/g++-14
          echo "=== combined report info ==="
          ls -l bazel-out/_coverage/_coverage_report.dat || true
          wc -l bazel-out/_coverage/_coverage_report.dat || true
          echo "--- first 20 lines of combined report ---"
          head -20 bazel-out/_coverage/_coverage_report.dat || true
          echo "=== per-test coverage.dat files ==="
          find bazel-out -name 'coverage.dat' -exec ls -l {} \; || true
          echo "=== resolving gcov / lcov ==="
          which gcov; gcov --version | head -1
          which lcov; lcov --version | head -1

      - name: Print coverage summary
        run: |
          lcov --summary bazel-out/_coverage/_coverage_report.dat --ignore-errors empty

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: bazel-out/_coverage/_coverage_report.dat
